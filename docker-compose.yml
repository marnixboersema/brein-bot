# Runs as a separate compose project that joins Open WebUI's existing network.
#
# Open WebUI on the brein VPS lives at /opt/brein → its Compose project name is
# `brein` → its default network is `brein_default`. The bot joins that network
# as `external: true` so it can reach Open WebUI at `open-webui:8080`.
#
# If you ever rename the WebUI project directory, update the network name below
# to match `<that-dir>_default`.

services:
  brein-bot:
    build: .
    container_name: brein-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - brein-bot-data:/data
    networks:
      - openwebui
    depends_on: []
    mem_limit: 512m

volumes:
  brein-bot-data:
    name: brein-bot-data

networks:
  openwebui:
    name: brein_default
    external: true
